name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type & Svelte check
        run: npm run check
      - name: Build
        run: npm run build
        env:
          # Build only needs these to be present, not valid.
          JWT_SECRET: ci-placeholder-secret
          DATABASE_URL: postgres://user:pass@localhost:5432/db
